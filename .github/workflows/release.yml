name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test -race ./...

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ldflags="-s -w -X main.version=${VERSION} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          GOOS=linux GOARCH=amd64 go build -ldflags "$ldflags" -o dist/tentaserve-linux-amd64 ./cmd/tentaserve
          GOOS=linux GOARCH=arm64 go build -ldflags "$ldflags" -o dist/tentaserve-linux-arm64 ./cmd/tentaserve
          GOOS=darwin GOARCH=amd64 go build -ldflags "$ldflags" -o dist/tentaserve-darwin-amd64 ./cmd/tentaserve
          GOOS=darwin GOARCH=arm64 go build -ldflags "$ldflags" -o dist/tentaserve-darwin-arm64 ./cmd/tentaserve
          GOOS=windows GOARCH=amd64 go build -ldflags "$ldflags" -o dist/tentaserve-windows-amd64.exe ./cmd/tentaserve

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tentaserve-linux-amd64
            dist/tentaserve-linux-arm64
            dist/tentaserve-darwin-amd64
            dist/tentaserve-darwin-arm64
            dist/tentaserve-windows-amd64.exe
            dist/checksums.txt

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
