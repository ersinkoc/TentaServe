# Tentaserve Configuration Example
# See full documentation at: https://tentaserve.dev/docs/config

# Server settings
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 1048576  # 1MB

# TLS configuration (optional)
# tls:
#   cert_file: "/etc/tentaserve/cert.pem"
#   key_file: "/etc/tentaserve/key.pem"

# Gateway settings
gateway:
  # Request routing
  rest_prefix: "/api"
  graphql_path: "/graphql"
  mcp_path: "/mcp"

  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_second: 100
    burst_size: 150

  # Circuit breaker
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout: 30s
    half_open_requests: 3

  # Caching
  cache:
    enabled: true
    max_size: 256MB
    ttl: 5m
    max_entry_size: 1MB

# Upstream services
upstreams:
  # REST API example
  - name: "users-api"
    type: "rest"
    base_url: "https://api.example.com"
    openapi:
      source: "https://api.example.com/openapi.json"
      refresh_interval: 1h
    timeout: 30s
    retry:
      max_attempts: 3
      backoff: exponential
      base_delay: 100ms
      max_delay: 5s
    auth:
      strategy: "forward"
      header: "Authorization"
    headers:
      X-API-Key: "${API_KEY}"

  # GraphQL API example
  - name: "products-api"
    type: "graphql"
    endpoint: "https://graphql.example.com/query"
    introspection:
      enabled: true
      refresh_interval: 1h
    timeout: 30s
    retry:
      max_attempts: 3
    auth:
      strategy: "bearer"
      token: "${GRAPHQL_TOKEN}"

# Schema settings
schema:
  # REST to GraphQL translation
  rest2graphql:
    enabled: true

  # GraphQL to REST translation
  graphql2rest:
    enabled: true
    endpoint_prefix: "/rest"

  # Pagination handling
  pagination:
    default_limit: 20
    max_limit: 100

  # Query limits
  limits:
    max_depth: 10
    max_complexity: 1000
    introspection: true

# MCP (Model Context Protocol) settings
mcp:
  enabled: true
  tools:
    auto_discover: true
    prefix: ""
  resources:
    auto_expose: true
  prompts:
    enabled: true
  sampling:
    enabled: true

# Observability settings
observability:
  # Logging
  logging:
    level: "info"  # debug, info, warn, error
    format: "json"  # json, text
    output: "stdout"  # stdout, stderr, or file path

  # Metrics (Prometheus format)
  metrics:
    enabled: true
    path: "/-/metrics"

  # Health checks
  health:
    enabled: true
    path: "/-/health"

  # Request ID
  request_id:
    header: "X-Request-ID"
    propagate: true

# Admin interface (optional)
admin:
  enabled: false
  path: "/-/admin"
  # auth:
  #   type: "basic"
  #   username: "admin"
  #   password: "${ADMIN_PASSWORD}"
