name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.22'
        run: |
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build all platforms
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/tentaserve-linux-amd64 ./cmd/tentaserve
          GOOS=linux GOARCH=arm64 go build -o bin/tentaserve-linux-arm64 ./cmd/tentaserve
          GOOS=darwin GOARCH=amd64 go build -o bin/tentaserve-darwin-amd64 ./cmd/tentaserve
          GOOS=darwin GOARCH=arm64 go build -o bin/tentaserve-darwin-arm64 ./cmd/tentaserve
          GOOS=windows GOARCH=amd64 go build -o bin/tentaserve-windows-amd64.exe ./cmd/tentaserve

      - name: Verify binary
        run: ./bin/tentaserve-linux-amd64 version

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tentaserve:ci .

      - name: Check image size
        run: |
          size=$(docker image inspect tentaserve:ci --format='{{.Size}}')
          size_mb=$((size / 1024 / 1024))
          echo "Image size: ${size_mb}MB"
          if [ "$size_mb" -gt 30 ]; then
            echo "Warning: Image size exceeds 30MB target"
          fi
